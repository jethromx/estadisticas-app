<!doctype html>
<html lang="es-MX">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Lotería MX</title>
    <meta name="description" content="Análisis estadístico de Melate, Revancha y Revanchita. Genera combinaciones con criterio estadístico." />
    <meta name="theme-color" content="#7c3aed" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lotería MX" />
    <link rel="apple-touch-icon" href="/pwa-192.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Lotería MX — Análisis Estadístico" />
    <meta property="og:description" content="Análisis estadístico de Melate, Revancha y Revanchita." />
    <!-- Dark mode: aplica clase antes del render para evitar flash -->
    <script>
      (function() {
        var stored = localStorage.getItem('lottery_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
